kind = "web"
previewPath = "/"
title = "Personal Portfolio"
version = "1.0.0"
id = "artifacts/portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "npm run dev"

[services.production]
build = [ "npm", "run", "build" ]
publicDir = "artifacts/portfolio/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
